# ld65 config for the perft binary: raw image at $4000 (engine code
# region per docs/plan.md; data below $1800 is bss poked by the harness).
MEMORY {
    MAIN: start = $4000, size = $7F00, file = %O;
}
SEGMENTS {
    CODE:   load = MAIN, type = rw;
    TABLES: load = MAIN, type = rw, align = $100;
}
