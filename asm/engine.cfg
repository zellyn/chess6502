# Engine image: raw binary at $4000; the LCCODE segment (aux-read
# primitives) loads inside the image and is copied to Language Card RAM
# by the loader at entry.
MEMORY {
    MAIN: start = $4000, size = $7F00, file = %O;
    LC:   start = $D000, size = $1000, file = "";
}
SEGMENTS {
    CODE:   load = MAIN,          type = rw;
    TABLES: load = MAIN,          type = rw, align = $100;
    LCCODE: load = MAIN, run = LC, type = rw, define = yes;
}
