# Multi-segment banked image: everything loads into one raw file imaged
# at $2000; the loader copies LCCODE to Language Card RAM and AUXDATA to
# the aux bank at run addresses.
MEMORY {
    MAIN: start = $2000, size = $9F00, file = %O;
    LC:   start = $D000, size = $1000, file = "";
    AUX:  start = $6000, size = $0100, file = "";
}
SEGMENTS {
    CODE:    load = MAIN,           type = rw;
    LCCODE:  load = MAIN, run = LC, type = rw, define = yes;
    AUXDATA: load = MAIN, run = AUX, type = rw, define = yes;
}
